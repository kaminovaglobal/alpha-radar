services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: alpharadar
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:

  postgres_data:  

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

    volumes:
     postgres_data:/var/lib/postgresql/data  