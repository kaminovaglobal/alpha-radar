name: Alpha Radar CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run Tests
        run: |
          # Only runs if pytest is configured, otherwise handles gracefully
          if command -v pytest &> /dev/null; then pytest; else echo "Pytest not installed or no tests found"; fi
- name: Install Frontend

  run: |

    cd frontend

    npm install

- name: Build Frontend

  run: |

    cd frontend

    npm run build

- name: Build Backend Docker

  run: |

    docker build -t backend ./backend

- name: Build Frontend Docker

  run: |

    docker build -t frontend ./frontend

- name: Security Scan

  uses: securecodewarrior/github-action-add-sarif@v1

- name: Bandit Scan

  run: |

    bandit -r backend

- name: Safety Scan

  run: |

    safety check                
